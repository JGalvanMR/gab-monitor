# gab-monitor-web/nginx.conf
server {
    listen 80;
    server_name monitor.gab.local localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas van a index.html
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Proxy hacia el API backend
    location /api/ {
        proxy_pass http://gab-monitor-api:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy WebSocket para SignalR
    location /hubs/ {
        proxy_pass http://gab-monitor-api:80/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
